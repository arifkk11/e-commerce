<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .otp-container {
            background-color: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .otp-heading {
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }
        
        .otp-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .form-group {
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        
        input[type="text"]:focus {
            border-color: #4a90e2;
            outline: none;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        }
        
        button {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #3a7bc8;
        }
        
        .otp-note {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="otp-container">
        <h1 class="otp-heading">OTP Verification</h1>
        <form method="POST" class="otp-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="otp">Enter 6-digit OTP</label>
                <input type="text" name="otp" id="otp" maxlength="6" required placeholder="••••••">
            </div>
            <button type="submit">Verify OTP</button>
        </form>
        <p class="otp-note">We've sent a verification code to your registered email/phone</p>
    </div>
    {% if messages %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    {% for message in messages %}
        {% if message.tags == 'error' %}
            Swal.fire({
                title: '{{ message|escapejs }}',
                icon: 'error',
                background: '#FFE6E6',  // Light red background
                confirmButtonColor: '#FF6B6B',  // Red button
                customClass: {
                    popup: 'error-swal-popup'
                }
            });
        {% else %}
            Swal.fire({
                title: '{{ message|escapejs }}',
                icon: 'success',
                background: '#D5F9E9',  // Your light green
                confirmButtonColor: '#7CC9A4',  // Your green
                customClass: {
                    popup: 'success-swal-popup'
                }
            });
        {% endif %}
    {% endfor %}
</script>
<style>
    .error-swal-popup {
        border-radius: 15px;
        border: 2px solid #FF6B6B;
    }
    .success-swal-popup {
        border-radius: 15px;
        border: 2px solid #7CC9A4;
    }
</style>
{% endif %}
</body>
</html>
