<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Address</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --primary-hover: #3a56d4;
            --error-color: #ef233c;
            --text-color: #2b2d42;
            --light-gray: #f8f9fa;
            --medium-gray: #6c757d;
            --border-color: #ced4da;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--light-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: var(--text-color);
        }

        .address-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
        }

        .address-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .address-heading {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }

        .address-subheading {
            color: var(--medium-gray);
            font-size: 0.95rem;
        }

        .address-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-group {
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-color);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15);
        }

        .form-row {
            display: flex;
            gap: 1rem;
        }

        .form-row .form-group {
            flex: 1;
        }

        button[type="submit"] {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
            width: 100%;
        }

        button[type="submit"]:hover {
            background-color: var(--primary-hover);
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--medium-gray);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s;
            text-align: center;
            width: 100%;
        }

        .back-link:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }

        @media (max-width: 576px) {
            .address-container {
                padding: 1.5rem;
            }
            
            .form-row {
                flex-direction: column;
                gap: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="address-container">
        <div class="address-header">
            <h1 class="address-heading">Update Address</h1>
            <p class="address-subheading">Please fill in your complete business address details</p>
        </div>
        
        <form method="POST" class="address-form">
            {% csrf_token %}
            
            <div class="form-row">
                <div class="form-group">
                    <label for="pin">PIN Code</label>
                    <input type="text" name="pin" id="pin" value="{{ address.pin }}" required 
                           placeholder="Enter 6-digit PIN" maxlength="6" pattern="\d{6}">
                </div>
                
                <div class="form-group">
                    <label for="post_office">Post Office</label>
                    <input type="text" name="post_office" id="post_office" value="{{ address.post_office }}" required 
                           placeholder="Post office name">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" name="city" id="city" value="{{ address.city }}" required 
                           placeholder="City name">
                </div>
                
                <div class="form-group">
                    <label for="state">State</label>
                    <input type="text" name="state" id="state" value="{{ address.state }}" required 
                           placeholder="State name">
                </div>
            </div>
            
            <div class="form-group">
                <label for="country">Country</label>
                <input type="text" name="country" id="country" value="{{ address.country }}" required 
                       placeholder="Country name">
            </div>
            
            <div class="form-group">
                <label for="extra_details">Extra Details (Optional)</label>
                <input type="text" name="extra_details" id="extra_details" value="{{ address.extra_details }}" 
                       placeholder="Building name, floor, etc.">
            </div>
            
            <button type="submit">Update Address</button>
            
            <a href="{% url 'seller_dashbord' %}" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Profile
            </a>
        </form>
    </div>

    <script>
        // PIN code validation
        const pinInput = document.getElementById('pin');
        
        pinInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, ''); // Allow only numbers
            if (this.value.length > 6) {
                this.value = this.value.slice(0, 6);
            }
        });

        // Auto-capitalize address fields
        const addressFields = ['post_office', 'city', 'state', 'country'];
        
        addressFields.forEach(fieldId => {
            const field = document.getElementById(fieldId);
            field.addEventListener('blur', function() {
                this.value = this.value
                    .split(' ')
                    .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
                    .join(' ');
            });
        });
    </script>
</body>
</html>
