<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-color: #4a6bff;
            --secondary-color: #f8f9fa;
            --danger-color: #ff4a4a;
            --warning-color: #ffc107;
            --success-color: #28a745;
            --dark-color: #343a40;
            --light-color: #f8f9fa;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f7fa;
            color: #333;
        }
        
        .dashboard-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        
        /* Sidebar Styles */
        .sidebar {
            background-color: var(--dark-color);
            color: white;
            padding: 20px 0;
        }
        
        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .sidebar-header h2 {
            margin: 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
        }
        
        .sidebar-header h2 i {
            margin-right: 10px;
            color: var(--primary-color);
        }
        
        .user-profile {
            display: flex;
            align-items: center;
            margin-top: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-weight: bold;
        }
        
        .user-info h4 {
            margin: 0;
            font-size: 0.9rem;
        }
        
        .user-info p {
            margin: 3px 0 0;
            font-size: 0.8rem;
            color: #aaa;
        }
        
        .nav-menu {
            padding: 20px 0;
        }
        
        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
        }
        
        .nav-item:hover, .nav-item.active {
            background-color: rgba(255, 255, 255, 0.1);
            border-left: 3px solid var(--primary-color);
        }
        
        .nav-item i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        
        /* Main Content Styles */
        .main-content {
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--dark-color);
        }
        
        .header-actions {
            display: flex;
            align-items: center;
        }
        
        .notification-btn {
            position: relative;
            margin-right: 20px;
            cursor: pointer;
        }
        
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: var(--danger-color);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }
        
        .user-dropdown {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .user-dropdown img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin-right: 10px;
        }
        
        /* Dashboard Cards */
        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 20px;
            transition: transform 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .card-title {
            font-size: 0.9rem;
            color: #666;
            font-weight: 500;
        }
        
        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .sales .card-icon { background-color: var(--primary-color); }
        .orders .card-icon { background-color: var(--success-color); }
        .inventory .card-icon { background-color: var(--warning-color); }
        .alerts .card-icon { background-color: var(--danger-color); }
        
        .card-value {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 5px 0;
        }
        
        .card-footer {
            font-size: 0.8rem;
            color: #666;
            display: flex;
            align-items: center;
        }
        
        .card-footer i {
            margin-right: 5px;
        }
        
        .positive {
            color: var(--success-color);
        }
        
        .negative {
            color: var(--danger-color);
        }
        
        /* Main Sections */
        .section {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0;
        }
        
        .section-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 8px 15px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            transition: all 0.3s;
        }
        
        .btn i {
            margin-right: 5px;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #3a5ae8;
        }
        
        .btn-outline {
            background-color: transparent;
            border: 1px solid #ddd;
            color: #666;
        }
        
        .btn-outline:hover {
            background-color: #f5f5f5;
        }
        
        /* Tables */
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .table th {
            text-align: left;
            padding: 12px 15px;
            background-color: #f8f9fa;
            font-weight: 500;
            color: #666;
            font-size: 0.9rem;
        }
        
        .table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }
        
        .table tr:last-child td {
            border-bottom: none;
        }
        
        .status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .status-pending {
            background-color: #fff3cd;
            color: #856404;
        }
        
        .status-completed {
            background-color: #d4edda;
            color: #155724;
        }
        
        .status-processing {
            background-color: #cce5ff;
            color: #004085;
        }
        
        .status-low {
            background-color: #f8d7da;
            color: #721c24;
        }
        
        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            margin: 0 5px;
            transition: color 0.3s;
        }
        
        .action-btn:hover {
            color: var(--primary-color);
        }
        
        /* Charts */
        .chart-container {
            height: 300px;
            margin-top: 20px;
        }
        
        /* Responsive */
        @media (max-width: 992px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                display: none;
            }
        }
        
        @media (max-width: 768px) {
            .dashboard-cards {
                grid-template-columns: 1fr 1fr;
            }
        }
        
        @media (max-width: 576px) {
            .dashboard-cards {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .header-actions {
                margin-top: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-store"></i> Seller Portal</h2>
                <div class="user-profile">
                <div class="user-avatar">
                    <img src="{{ user.profile_image }}" alt="Profile Picture" style="width:48px; height:48px; border-radius:50%;">
                </div>                    <div class="user-info">
                        <p>Seller</p>
                    </div>
                </div>
            </div>
            
            <div class="nav-menu">
                <div class="nav-item">
                    <a href="{% url 'seller_dashbord' %}" style="text-decoration: none; color: white;">
                        <i class="fas fa-tachometer-alt"></i> Dashboard
                    </a>
                </div>
                <div class="nav-item">
                    <a href="{% url 'seller_products' %}" style="text-decoration: none; color: white;">
                        <i class="fas fa-box"></i> Products
                    </a>
                </div>
                <div class="nav-item">
                    <a href="{% url 'seller_orders' %}" style="text-decoration: none; color: white;">
                        <i class="fas fa-shopping-cart"></i> Orders
                    </a>
                </div>
                <div class="nav-item active">
                    <a href="{% url 'seller_report' %}" style="text-decoration: none; color: white;">
                        <i class="fas fa-chart-line"></i> Reports
                    </a>
                </div>
                
                <div class="nav-item">
                    <a href="{% url 'seller_inventory' %}" style="text-decoration: none; color: white;">
                        <i class="fas fa-warehouse"></i> Inventory
                    </a>
                </div>

                <a href="{% url 'custom_logout' %}" class="nav-item" style="text-decoration: none; color: red;">
                <div class="nav-item" style="color: red;">
                    <i class="fas fa-sign-out-alt"></i> Logout          
                </div>
                </a>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <div class="header">
                <h1>Seller report</h1>
                <div class="header-actions">
                    
                </div>
            </div>
            
           
            <!-- Sales Analytics Section -->
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Sales Analytics</h2>
                    <div class="section-actions">
                        <select class="btn btn-outline" style="padding: 8px 12px;">
                            <option>Last 7 Days</option>
                            <option>Last 30 Days</option>
                            <option selected>Last 90 Days</option>
                            <option>This Year</option>
                        </select>
                        <button class="btn btn-outline">
                            <i class="fas fa-download"></i> Export
                        </button>
                    </div>
                </div>
                
                <div class="chart-container">
                    <canvas id="orderStatusChart" width="400" height="200"></canvas>
                    <h3>Delivered Orders Total Sales</h3>
                    <canvas id="deliveredSalesChart" width="400" height="200"></canvas>
                    <!-- Chart would be rendered here with a library like Chart.js -->
                    <div style="background-color: #f8f9fa; border-radius: 5px; height: 100%; display: flex; align-items: center; justify-content: center; color: #666;">
                       

                    </div>
                </div>
            </div> 
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // Pass Django data to JS
    const statusData = {{ status_data|safe }};
    
    const ctx = document.getElementById('orderStatusChart').getContext('2d');
    const orderStatusChart = new Chart(ctx, {
        type: 'pie', // you can also use 'bar'
        data: {
            labels: Object.keys(statusData).map(key => key.charAt(0).toUpperCase() + key.slice(1)),
            datasets: [{
                label: 'Orders by Status',
                data: Object.values(statusData),
                backgroundColor: [
                    'rgba(255, 206, 86, 0.6)',   // Pending
                    'rgba(54, 162, 235, 0.6)',   // Paid
                    'rgba(75, 192, 192, 0.6)',   // Shipped
                    'rgba(153, 102, 255, 0.6)',  // Delivered
                    'rgba(255, 99, 132, 0.6)'    // Cancelled
                ],
                borderColor: [
                    'rgba(255, 206, 86, 1)',
                    'rgba(54, 162, 235, 1)',
                    'rgba(23, 214, 214, 1)',
                    'rgba(153, 102, 255, 1)',
                    'rgba(255, 99, 132, 1)'
                ],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'right',
                },
                title: {
                    display: true,
                    text: 'Orders by Status'
                }
            }
        }
    });


    const deliveredSales = {{ delivered_sales|floatformat:2 }};

        const ctx2 = document.getElementById('deliveredSalesChart').getContext('2d');
        const deliveredSalesChart = new Chart(ctx2, {
            type: 'bar', // could also be 'line'
            data: {
                labels: ['Delivered Orders'], // single bar
                datasets: [{
                    label: 'Total Sales (₹)',
                    data: [deliveredSales],
                    backgroundColor: 'rgba(75, 192, 192, 0.6)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false },
                    title: {
                        display: true,
                        text: 'Total Sales from Delivered Orders'
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
</script>


</body>
</html>
